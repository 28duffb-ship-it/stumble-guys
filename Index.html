<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumble Guys Unblocked</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100vw; height: 100vh; border: none; }
    </style>
    <!-- Polyfill framework to allow custom iframe behaviors -->
    <script src="https://unpkg.com/@ungap/custom-elements-builtin"></script>

</head>
<body>
    <!-- Notice the 'is="x-frame-bypass"' attribute added below -->
    <iframe is="x-frame-bypass" src="https://stumbleguys.com"></iframe>
</body>
</html>
